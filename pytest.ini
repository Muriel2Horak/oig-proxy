[pytest]
testpaths = tests
addopts = -ra
markers =
    asyncio: async tests
    transport: transport layer extraction tests (Wave 2)
    telemetry: telemetry TAP extraction tests (Wave 2)
    twin_activation: digital twin activation guard tests (Wave 3)
filterwarnings =
    ignore:Unknown pytest.mark.asyncio:pytest.PytestUnknownMarkWarning