name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run unit tests with coverage
        env:
          PYTHONPATH: addon/oig-proxy
        run: |
          mkdir -p reports
          pytest --junitxml=reports/junit.xml --cov=addon/oig-proxy --cov-report=xml:reports/coverage.xml --cov-fail-under=69
      - name: Type checking (mypy)
        env:
          PYTHONPATH: addon/oig-proxy
        run: |
          # mypy requires workaround for hyphenated addon path with __init__.py
          # Due to PEP 420 namespace package handling of hyphenated names in mypy 1.x
          mv addon/oig-proxy/__init__.py addon/oig-proxy/__init__.py.bak
          mypy addon/oig-proxy --ignore-missing-imports
          MYPY_EXIT=$?
          mv addon/oig-proxy/__init__.py.bak addon/oig-proxy/__init__.py
          exit $MYPY_EXIT
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: addon/oig-proxy/Dockerfile
          ignore: DL3006,DL3018
      - name: Security scan (bandit)
        run: |
          mkdir -p reports
          bandit -r addon/oig-proxy -x addon/oig-proxy/tests -f json -o reports/bandit.json

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
